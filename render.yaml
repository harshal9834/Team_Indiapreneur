services:
  - type: web
    name: verionyx-platform
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      # Ensure static-ffmpeg is initialized during build if possible
    startCommand: gunicorn backend.main:app
    envVars:
      - key: MONGODB_URI
        sync: false # Set your MongoDB Atlas connection string here
      - key: JWT_SECRET_KEY
        generateValue: true # Generates a random secret on deploy
      - key: DEBUG
        value: "False"
      - key: PORT
        value: "10000"
    # Ensure background worker has enough memory for ML models
    plan: starter # Standard starter plan (or higher) is recommended for ML
